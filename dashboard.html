<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — CivicLens</title>
  <meta name="description" content="CivicLens Dashboard — View, report, and track civic issues on an interactive map." />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script type="module" crossorigin src="./assets/dashboard-DUGtcLO1.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/supabase-DAXHF4Ye.js">
  <link rel="modulepreload" crossorigin href="./assets/notifications-C4PrM5w5.js">
  <link rel="stylesheet" crossorigin href="./assets/supabase-DqwK0Drr.css">
  <link rel="stylesheet" crossorigin href="./assets/dashboard-CTxtrcxn.css">
</head>
<body>

  <div class="dashboard-layout">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar">

      <div class="sidebar-brand">
        <h2>CivicLens<span>.</span></h2>
      </div>

      <div class="user-card">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-details">
          <h3 id="user-name">Loading...</h3>
          <span class="user-role" id="user-role">Citizen</span>
        </div>
      </div>

      <div class="sidebar-stats">
        <div class="mini-stat">
          <span class="mini-stat-value pending" id="stat-pending">0</span>
          <span class="mini-stat-label">Pending</span>
        </div>
        <div class="mini-stat">
          <span class="mini-stat-value progress" id="stat-progress">0</span>
          <span class="mini-stat-label">In Progress</span>
        </div>
        <div class="mini-stat">
          <span class="mini-stat-value resolved" id="stat-resolved">0</span>
          <span class="mini-stat-label">Resolved</span>
        </div>
        <div class="mini-stat">
          <span class="mini-stat-value" id="stat-credits" style="color: var(--accent);">0</span>
          <span class="mini-stat-label">Credits</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <ul>
          <li class="nav-item active" data-filter="default">
            <a><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Dashboard</a>
          </li>
          <li class="nav-item" data-filter="mine">
            <a><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></span> My Reports</a>
          </li>
          <li class="nav-item hidden" id="nav-admin" data-filter="all">
            <a><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5"/><path d="M18 12a2 2 0 100 4 2 2 0 000-4z"/></svg></span> Dept. Overview</a>
          </li>
          <li class="nav-item hidden" id="nav-analytics">
            <a href="admin.html"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span> Analytics</a>
          </li>
          <li class="nav-item">
            <a href="rewards.html"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg></span> Rewards</a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-feed-title">Recent Updates</div>
      <div class="sidebar-feed" id="complaints-list">
        <div class="feed-loading">Loading updates...</div>
      </div>

      <div class="sidebar-footer">
        <a href="index.html" class="btn btn-ghost btn-sm" style="flex:0;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        </a>
        <button class="btn btn-danger btn-sm" id="logout-btn" style="flex:1;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Logout
        </button>
      </div>

    </aside>

    <!-- ═══ MAP AREA ═══ -->
    <main class="map-area">

      <div class="map-controls">
        <!-- Animated Search Bar -->
        <div class="search-wrapper" id="search-wrapper">
          <div class="search-bar" id="search-bar">
            <button class="search-icon-btn" id="search-toggle" aria-label="Search location">
              <svg width="16" height="16" viewBox="0 0 15 15" fill="currentColor"><path d="M10 6.5C10 8.433 8.433 10 6.5 10C4.567 10 3 8.433 3 6.5C3 4.567 4.567 3 6.5 3C8.433 3 10 4.567 10 6.5ZM9.30884 10.0159C8.53901 10.6318 7.56251 11 6.5 11C4.01472 11 2 8.98528 2 6.5C2 4.01472 4.01472 2 6.5 2C8.98528 2 11 4.01472 11 6.5C11 7.56251 10.6318 8.53901 10.0159 9.30884L12.8536 12.1464C13.0488 12.3417 13.0488 12.6583 12.8536 12.8536C12.6583 13.0488 12.3417 13.0488 12.1464 12.8536L9.30884 10.0159Z" fill-rule="evenodd" clip-rule="evenodd"/></svg>
            </button>
            <input type="text" class="search-input" id="search-input" placeholder="Search location..." aria-label="Search location" />
            <div class="search-spinner hidden" id="search-spinner">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            </div>
          </div>
          <div class="search-results" id="search-results"></div>
        </div>

        <button class="map-btn" id="locate-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          My Location
        </button>
        <button class="map-btn" id="heatmap-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/></svg>
          Heatmap
        </button>
      </div>

      <div id="map"></div>

      <!-- Report Form (hidden by default) -->
      <div class="report-overlay hidden" id="report-form-container">
        <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Report Issue</h3>
        <p class="coords" id="coords-display">Lat: —, Lng: —</p>

        <form class="report-form" id="complaint-form">
          <label for="category">Category</label>
          <select id="category" class="input-field" required>
            <option value="Roads">Pothole / Road Damage</option>
            <option value="Garbage">Garbage / Sanitation</option>
            <option value="Water">Water Leakage</option>
            <option value="Streetlight">Broken Streetlight</option>
            <option value="Drainage">Drainage / Flooding</option>
            <option value="Other">Other</option>
          </select>

          <label for="desc">Description</label>
          <textarea id="desc" class="input-field" placeholder="Describe the issue..." rows="3" required></textarea>

          <label>Photo Evidence (Optional)</label>
          <div class="upload-area" id="upload-area">
            <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Click or drag to upload</span>
            <input type="file" id="image-input" accept="image/*" />
          </div>
          <img class="upload-preview" id="image-preview" alt="Preview" />

          <div class="report-form-buttons">
            <button type="submit" class="btn btn-primary btn-sm" id="report-submit-btn">
              <span id="report-btn-text">Submit</span>
              <span id="report-spinner" class="spinner hidden"></span>
            </button>
            <button type="button" class="btn btn-ghost btn-sm" id="report-cancel-btn">Cancel</button>
          </div>
        </form>
      </div>

    </main>

    <!-- ═══ COMPLAINT DETAIL MODAL ═══ -->
    <div class="detail-modal-overlay hidden" id="detail-modal">
      <div class="detail-modal">
        <button class="detail-modal-close" id="detail-modal-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>

        <div class="detail-modal-body">
          <!-- Image -->
          <div class="detail-image-section hidden" id="detail-image-section">
            <img id="detail-image" alt="Evidence photo" />
          </div>

          <!-- Info -->
          <div class="detail-info-section">
            <div class="detail-top-row">
              <span class="badge" id="detail-badge"></span>
              <span class="detail-date" id="detail-date"></span>
            </div>

            <h2 class="detail-category" id="detail-category"></h2>

            <div class="detail-description" id="detail-description"></div>

            <div class="detail-meta">
              <div class="detail-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span id="detail-location"></span>
              </div>
              <div class="detail-meta-item hidden" id="detail-severity-display">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span id="detail-severity-text"></span>
              </div>
            </div>

            <!-- Actions container filled by JS -->
            <div class="detail-actions" id="detail-actions"></div>

            <button class="btn btn-ghost btn-sm detail-locate-btn" id="detail-locate-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              View on Map
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
